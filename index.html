<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Max</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap');
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }

        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            padding: 20px; z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { font-weight: 300; font-size: 1.6rem; margin-bottom: 20px; }
        p { font-size: 1.1rem; line-height: 1.5; margin-bottom: 30px; opacity: 0.9; }
        
        button { 
            width: 100%; padding: 16px; border-radius: 15px; border: none; 
            background: #fff; color: #000; font-size: 1rem; font-weight: 600; 
            cursor: pointer; transition: all 0.2s; margin-bottom: 10px;
        }
        button:active { transform: scale(0.96); }
        .hidden { display: none !important; }
        #final-text { color: #ffafcc; font-size: 1.4rem; line-height: 1.4; }
    </style>
</head>
<body>

    <canvas id="space"></canvas>

    <div id="intro-screen" class="screen">
        <div class="card">
            <h1>Nossa viagem pelo universo</h1>
            <p>Posso te levar pra conhecer o universo?<br>Só você e eu.</p>
            <button id="start-btn">Começar</button>
        </div>
    </div>

    <div id="question-screen" class="screen hidden">
        <div class="card">
            <h1>Gostou da viagem?</h1>
            <button id="yes-btn">Sim</button>
            <button id="no-btn">Não</button>
        </div>
    </div>

    <div id="final-screen" class="screen hidden">
        <div class="card">
            <h1 id="final-text"></h1>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('space');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [];
        let speed = 0.3;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = [];
            // Apenas 80 estrelas para um visual mais limpo
            for (let i = 0; i < 80; i++) {
                stars.push({ 
                    x: (Math.random()-0.5)*w*2, 
                    y: (Math.random()-0.5)*h*2, 
                    z: Math.random()*w, 
                    size: Math.random()*1.5 + 0.5 
                });
            }
        }

        function draw() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.3)";
            ctx.fillRect(0, 0, w, h);
            
            stars.forEach(s => {
                s.z -= speed;
                if (s.z <= 0) { 
                    s.z = w; 
                    s.x = (Math.random()-0.5)*w*2; 
                    s.y = (Math.random()-0.5)*h*2; 
                }
                
                let scale = w / (w + s.z);
                let x2 = s.x * scale + w/2;
                let y2 = s.y * scale + h/2;
                let r = s.size * scale;

                let grad = ctx.createRadialGradient(x2, y2, 0, x2, y2, r*3);
                grad.addColorStop(0, 'white');
                grad.addColorStop(0.5, 'rgba(200, 200, 255, 0.5)');
                grad.addColorStop(1, 'transparent');

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x2, y2, r*3, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        init();
        draw();

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('intro-screen').classList.add('hidden');
            speed = 12; 
            setTimeout(() => {
                speed = 0.3;
                document.getElementById('question-screen').classList.remove('hidden');
            }, 8000);
        };

        document.getElementById('yes-btn').onclick = () => {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('final-text').innerText = "Ainda bem, te amo minha Max, feliz dia das mulheres ✨";
            document.getElementById('final-screen').classList.remove('hidden');
        };

        document.getElementById('no-btn').onclick = () => {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('final-text').innerText = "fds";
            document.getElementById('final-screen').classList.remove('hidden');
        };
    </script>
</body>
</html>
