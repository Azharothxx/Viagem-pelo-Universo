<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Max</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            z-index: 10; padding: 20px; box-sizing: border-box;
            /* Transição removida para troca instantânea */
        }

        .hidden { display: none !important; }

        h1, h2 { 
            font-size: clamp(1.8rem, 8vw, 2.5rem); 
            color: #f0e6ff; margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        
        button {
            padding: 16px 40px; font-size: 1.1rem; font-weight: bold;
            background: rgba(255, 255, 255, 0.1); color: #fff;
            border: 1px solid #666; border-radius: 50px;
            cursor: pointer; backdrop-filter: blur(5px);
            margin: 10px;
        }
        
        button:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }

        #final-text { color: #ff99cc; }
    </style>
</head>
<body>

    <canvas id="space"></canvas>

    <div id="intro-screen" class="screen">
        <h1>Nossa viagem pelo universo</h1>
        <p>Posso te levar pra conhecer o universo?<br>Só você e eu.</p>
        <button id="start-btn">Começar</button>
    </div>

    <div id="question-screen" class="screen hidden">
        <h2>Gostou da viagem?</h2>
        <div>
            <button id="yes-btn">Sim</button>
            <button id="no-btn">Não</button>
        </div>
    </div>

    <div id="final-screen" class="screen hidden">
        <h2 id="final-text"></h2>
    </div>

    <script>
        const canvas = document.getElementById('space');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        let speed = 0.5;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Star {
            constructor() {
                this.x = (Math.random() - 0.5) * width;
                this.y = (Math.random() - 0.5) * height;
                this.z = Math.random() * width;
                this.pz = this.z;
            }
            update() {
                this.z -= speed;
                if (this.z < 1) {
                    this.z = width;
                    this.x = (Math.random() - 0.5) * width;
                    this.y = (Math.random() - 0.5) * height;
                    this.pz = this.z;
                }
            }
            draw() {
                let sx = (this.x / this.z) * width + width / 2;
                let sy = (this.y / this.z) * height + height / 2;
                let r = (1 - this.z / width) * 2;
                ctx.beginPath();
                ctx.arc(sx, sy, r, 0, Math.PI * 2);
                ctx.fillStyle = "white";
                ctx.fill();
                let px = (this.x / this.pz) * width + width / 2;
                let py = (this.y / this.pz) * height + height / 2;
                this.pz = this.z;
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(sx, sy);
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 + (1 - this.z / width)})`;
                ctx.lineWidth = r;
                ctx.stroke();
            }
        }

        resize();
        for (let i = 0; i < 400; i++) stars.push(new Star());

        function animate() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.4)";
            ctx.fillRect(0, 0, width, height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', resize);
        animate();

        // TRANSIÇÃO
        const intro = document.getElementById('intro-screen');
        const question = document.getElementById('question-screen');
        const final = document.getElementById('final-screen');
        const finalText = document.getElementById('final-text');

        document.getElementById('start-btn').onclick = function() {
            intro.classList.add('hidden');
            speed = 25; 
            setTimeout(() => {
                speed = 1.5;
                question.classList.remove('hidden');
            }, 10000); 
        };

        document.getElementById('yes-btn').onclick = function() {
            question.classList.add('hidden');
            finalText.innerText = "ainda bem, te amo minha Max, feliz dia das mulheres";
            final.classList.remove('hidden');
        };

        document.getElementById('no-btn').onclick = function() {
            question.classList.add('hidden');
            finalText.innerText = "Que tal sifuder?";
            final.classList.remove('hidden');
        };
    </script>
</body>
</html>
